services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://api-centralizador.apiworking.pe/api
        NEXT_PUBLIC_SITE_URL: https://apicrm.apiworkingeducation.com
        CMS_REMOTE_BASE_URL: https://api-centralizador.apiworking.pe

    container_name: apiworkingscr
    restart: unless-stopped
    ports:
      - "3005:3000"

    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1